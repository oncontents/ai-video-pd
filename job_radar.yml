name: Lifelong Educator Job Radar

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: job-radar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SQLite state
        uses: actions/cache@v4
        with:
          path: job-radar/database/job_radar.sqlite3
          key: job-radar-db-${{ github.run_id }}
          restore-keys: |
            job-radar-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job radar
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'oncontents@gmail.com' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'Job Radar <onboarding@resend.dev>' }}
          DATABASE_PATH: database/job_radar.sqlite3
          REPORTS_DIR: reports
          SOURCES_PATH: sources.json
        run: python main.py

      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        with:
          name: job-radar-report
          path: job-radar/reports/*.md
          if-no-files-found: ignore
